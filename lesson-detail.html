<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson — Grammar Stories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #B8A9D9;
      --primary-dark: #9684C2;
      --accent: #A8E6CF;
      --bg: #FAF7F2;
      --surface: #FFFFFF;
      --text-primary: #3D3A4E;
      --text-secondary: #8A8698;
      --border: #EAE5DD;
      --success: #A3D9A5;
      --error: #F4A8A0;
      --shadow-sm: 0 2px 8px rgba(61,58,78,0.06);
      --shadow-md: 0 4px 16px rgba(61,58,78,0.08);
      --shadow-lg: 0 10px 30px rgba(61,58,78,0.14);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    /* ── TOP BAR ── */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 52px 20px 12px;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .back-btn {
      width: 38px; height: 38px;
      border-radius: 13px;
      background: white;
      border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700;
      color: var(--text-primary);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
      text-decoration: none;
    }
    .top-bar-title {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--text-primary);
      flex: 1;
    }
    .step-indicator {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 600;
      background: white;
      padding: 5px 11px;
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      white-space: nowrap;
    }

    /* ── STEP PROGRESS BAR ── */
    .step-bar {
      display: flex;
      gap: 5px;
      padding: 2px 20px 16px;
    }
    .step-seg {
      flex: 1; height: 4px;
      border-radius: 999px;
      background: var(--border);
      transition: background 0.4s ease;
    }
    .step-seg.done   { background: var(--primary); }
    .step-seg.active { background: var(--primary-dark); }

    /* ── BODY ── */
    .body {
      padding: 4px 20px 48px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
    }

    /* ── CARDS ── */
    .card {
      background: white;
      border-radius: 22px;
      padding: 20px 18px;
      box-shadow: var(--shadow-md);
    }
    .card-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--primary-dark);
      margin-bottom: 10px;
    }
    .card h3 {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: var(--text-primary);
      margin-bottom: 10px;
    }
    .card p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.75;
    }

    /* Grammar highlight in story */
    .hl {
      background: linear-gradient(135deg, #EDE8F5, #E4DCFF);
      color: var(--primary-dark);
      border-radius: 5px;
      padding: 2px 5px;
      font-weight: 700;
    }

    /* Pattern box */
    .pattern-box {
      background: linear-gradient(135deg, #F2EEFF 0%, #EBF8F3 100%);
      border-radius: 16px;
      padding: 16px;
    }
    .pattern-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 8px 0;
      border-bottom: 1px solid rgba(184,169,217,0.20);
    }
    .pattern-row:first-child { padding-top: 0; }
    .pattern-row:last-child  { border-bottom: none; padding-bottom: 0; }
    .pattern-lbl {
      font-size: 10px;
      color: var(--text-secondary);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      flex-shrink: 0;
      padding-top: 2px;
    }
    .pattern-val {
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      color: var(--primary-dark);
      font-weight: 700;
      text-align: right;
      max-width: 200px;
      line-height: 1.4;
    }

    /* Signal word tags */
    .signal-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }
    .signal-tag {
      background: linear-gradient(135deg, #A8E6CF, #8DD9BD);
      color: #1A5C42;
      padding: 6px 13px;
      border-radius: 9px;
      font-size: 11px;
      font-weight: 700;
      box-shadow: 0 3px 8px rgba(168,230,207,0.40);
    }

    /* Example items */
    .example-item {
      border-left: 3px solid var(--primary);
      padding: 2px 0 2px 14px;
      margin-bottom: 14px;
    }
    .example-item:last-child { margin-bottom: 0; }
    .example-sent {
      font-size: 13px;
      color: var(--text-primary);
      line-height: 1.7;
      font-weight: 500;
    }
    .example-note {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 3px;
    }

    /* Common mistakes */
    .mistake-block { margin-bottom: 14px; }
    .mistake-block:last-child { margin-bottom: 0; }
    .mistake-lbl {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .mistake-wrong {
      background: #FCEEEC;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 13px;
      color: #7A2E24;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .mistake-correct {
      background: #EAF7EA;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 13px;
      color: #1F5C2A;
      font-weight: 500;
    }
    .mistake-reason {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 7px;
      line-height: 1.55;
    }
    .divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }

    /* ── QUIZ SECTION ── */
    .quiz-dots {
      display: flex;
      gap: 7px;
      padding: 2px 20px 14px;
    }
    .q-dot {
      flex: 1; height: 7px;
      border-radius: 999px;
      background: var(--border);
      transition: background 0.3s ease;
    }
    .q-dot.done  { background: linear-gradient(90deg, var(--success), #7DC981); }
    .q-dot.wrong { background: linear-gradient(90deg, var(--error), #E8877E); }
    .q-dot.active{ background: linear-gradient(90deg, var(--primary), var(--primary-dark)); }

    .question-card {
      background: white;
      border-radius: 22px;
      padding: 22px 20px;
      box-shadow: var(--shadow-md);
    }
    .q-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--primary-dark);
      margin-bottom: 12px;
    }
    .q-text {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 17px;
      color: var(--text-primary);
      line-height: 1.5;
    }
    .q-blank {
      display: inline-block;
      min-width: 90px;
      border-bottom: 2.5px solid var(--primary);
      margin: 0 3px;
      text-align: center;
      color: var(--primary-dark);
      font-weight: 800;
      padding-bottom: 1px;
    }
    .q-blank.correct { border-color: var(--success); color: #1F5C2A; }
    .q-blank.wrong   { border-color: var(--error);   color: #7A2E24; }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .opt {
      background: white;
      border: 2px solid var(--border);
      border-radius: 18px;
      padding: 17px 18px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      text-align: left;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
    }
    .opt:active { transform: scale(0.98); }
    .opt.selected-correct {
      background: #EAF7EA;
      border-color: var(--success);
      color: #1F5C2A;
      font-weight: 700;
    }
    .opt.selected-wrong {
      background: #FCEEEC;
      border-color: var(--error);
      color: #7A2E24;
      font-weight: 700;
    }
    .opt.show-correct {
      background: #EAF7EA;
      border-color: var(--success);
      color: #1F5C2A;
      font-weight: 600;
    }
    .opt.dimmed { opacity: 0.42; pointer-events: none; }

    .feedback-panel {
      border-radius: 20px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .feedback-panel.correct {
      background: linear-gradient(135deg, #EAF7EA 0%, #D8F3DA 100%);
      border: 1.5px solid rgba(163,217,165,0.60);
    }
    .feedback-panel.wrong {
      background: linear-gradient(135deg, #FCEEEC 0%, #FAE2DF 100%);
      border: 1.5px solid rgba(244,168,160,0.60);
    }
    .feedback-title {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 15px;
    }
    .feedback-panel.correct .feedback-title { color: #1A6B2E; }
    .feedback-panel.wrong   .feedback-title { color: #7A2E24; }
    .feedback-text { font-size: 13px; line-height: 1.65; }
    .feedback-panel.correct .feedback-text { color: #2A6B38; }
    .feedback-panel.wrong   .feedback-text { color: #8A3A2E; }

    /* ── RESULT SECTION ── */
    .result-hero {
      background: radial-gradient(circle at 50% 0%, #F3EEFC 0%, #E8F6EF 70%);
      padding: 48px 28px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin: -4px -20px 0;
    }
    .result-emoji-box {
      width: 88px; height: 88px;
      background: white;
      border-radius: 28px;
      display: flex; align-items: center; justify-content: center;
      font-size: 42px;
      box-shadow: 0 14px 32px rgba(150,132,194,0.22);
    }
    .result-title {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 24px;
      color: var(--text-primary);
      text-align: center;
    }
    .result-sub {
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
    }
    .score-badge {
      background: white;
      border-radius: 22px;
      padding: 18px 40px;
      box-shadow: 0 10px 28px rgba(150,132,194,0.20);
      text-align: center;
    }
    .score-num {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 38px;
      color: var(--primary-dark);
      letter-spacing: -0.02em;
    }
    .score-lbl {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 600;
      margin-top: 2px;
    }
    .xp-card {
      background: linear-gradient(135deg, #FFF8E7 0%, #FFF0C2 100%);
      border-radius: 20px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 6px 16px rgba(255,201,107,0.25);
      border: 1.5px solid rgba(255,201,107,0.35);
    }
    .xp-icon-box {
      width: 52px; height: 52px;
      border-radius: 16px;
      background: linear-gradient(135deg, #FFD980, #FFC14D);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      box-shadow: 0 6px 14px rgba(255,193,77,0.45);
      flex-shrink: 0;
    }
    .xp-gained {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 19px;
      color: #8A6D1F;
    }
    .xp-total {
      font-size: 12px;
      color: #A68A38;
      margin-top: 3px;
      font-weight: 500;
    }
    .progress-card {
      background: white;
      border-radius: 20px;
      padding: 18px 20px;
      box-shadow: var(--shadow-md);
    }
    .progress-card-lbl {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 600;
      margin-bottom: 9px;
    }
    .progress-track {
      height: 10px;
      background: #EFEAF5;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--primary-dark));
      border-radius: 999px;
      transition: width 0.6s ease;
    }
    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 600;
    }
    .result-actions {
      display: flex;
      gap: 10px;
    }
    .btn-outline {
      flex: 1;
      padding: 16px;
      background: white;
      color: var(--primary-dark);
      border: 2px solid var(--primary);
      border-radius: 18px;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 14px;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .next-preview {
      font-size: 11px;
      color: var(--text-secondary);
      text-align: center;
      font-weight: 500;
    }

    /* ── BUTTONS ── */
    .btn-full {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      border: none;
      border-radius: 18px;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 14px;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(150,132,194,0.38);
      transition: transform 0.2s ease;
    }
    .btn-full:active { transform: scale(0.98); }
    .btn-full.dark {
      background: linear-gradient(135deg, #7C6BAA 0%, #6255A0 100%);
      box-shadow: 0 8px 20px rgba(100,85,160,0.40);
    }

    /* ── HIDDEN ── */
    .hidden { display: none !important; }

    @media (max-width: 480px) {
      body { padding: 0; }
      .page { max-width: 100%; }
    }
  </style>
</head>

  <!-- TOP BAR -->
  <div class="top-bar">
    <a class="back-btn" id="backBtn" href="lessons.html">←</a>

  <div class="step-bar" id="stepBar">

    <div class="step-seg" id="seg3"></div>

  </div>

  <!-- DYNAMIC CONTENT -->
  <div class="body" id="mainBody"></div>

</div>

      {
        question: '___ she usually buy coffee?',
        blank: '___',
        options: ['Do', 'Is', 'Does', 'Has'],
        correct: 2,
        explanation: 'Untuk pertanyaan Present Simple dengan subject she/he/it, kita pakai "Does" di awal kalimat.'
