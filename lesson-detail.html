<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson — Grammar Stories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #B8A9D9;
      --primary-dark: #9684C2;
      --accent: #A8E6CF;
      --bg: #FAF7F2;
      --surface: #FFFFFF;
      --text-primary: #3D3A4E;
      --text-secondary: #8A8698;
      --border: #EAE5DD;
      --success: #A3D9A5;
      --error: #F4A8A0;
      --shadow-sm: 0 2px 8px rgba(61,58,78,0.06);
      --shadow-md: 0 4px 16px rgba(61,58,78,0.08);
      --shadow-lg: 0 10px 30px rgba(61,58,78,0.14);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    /* ── TOP BAR ── */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 52px 20px 12px;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .back-btn {
      width: 38px; height: 38px;
      border-radius: 13px;
      background: white;
      border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700;
      color: var(--text-primary);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
      text-decoration: none;
    }
    .top-bar-title {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--text-primary);
      flex: 1;
    }
    .step-indicator {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 600;
      background: white;
      padding: 5px 11px;
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      white-space: nowrap;
    }

    /* ── STEP PROGRESS BAR ── */
    .step-bar {
      display: flex;
      gap: 5px;
      padding: 2px 20px 16px;
    }
    .step-seg {
      flex: 1; height: 4px;
      border-radius: 999px;
      background: var(--border);
      transition: background 0.4s ease;
    }
    .step-seg.done   { background: var(--primary); }
    .step-seg.active { background: var(--primary-dark); }

    /* ── BODY ── */
    .body {
      padding: 4px 20px 48px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
    }

    /* ── CARDS ── */
    .card {
      background: white;
      border-radius: 22px;
      padding: 20px 18px;
      box-shadow: var(--shadow-md);
    }
    .card-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--primary-dark);
      margin-bottom: 10px;
    }
    .card h3 {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: var(--text-primary);
      margin-bottom: 10px;
    }
    .card p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.75;
    }

    /* Grammar highlight in story */
    .hl {
      background: linear-gradient(135deg, #EDE8F5, #E4DCFF);
      color: var(--primary-dark);
      border-radius: 5px;
      padding: 2px 5px;
      font-weight: 700;
    }

    /* Pattern box */
    .pattern-box {
      background: linear-gradient(135deg, #F2EEFF 0%, #EBF8F3 100%);
      border-radius: 16px;
      padding: 16px;
    }
    .pattern-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 8px 0;
      border-bottom: 1px solid rgba(184,169,217,0.20);
    }
    .pattern-row:first-child { padding-top: 0; }
    .pattern-row:last-child  { border-bottom: none; padding-bottom: 0; }
    .pattern-lbl {
      font-size: 10px;
      color: var(--text-secondary);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      flex-shrink: 0;
      padding-top: 2px;
    }
    .pattern-val {
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      color: var(--primary-dark);
      font-weight: 700;
      text-align: right;
      max-width: 200px;
      line-height: 1.4;
    }

    /* Signal word tags */
    .signal-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }
    .signal-tag {
      background: linear-gradient(135deg, #A8E6CF, #8DD9BD);
      color: #1A5C42;
      padding: 6px 13px;
      border-radius: 9px;
      font-size: 11px;
      font-weight: 700;
      box-shadow: 0 3px 8px rgba(168,230,207,0.40);
    }

    /* Example items */
    .example-item {
      border-left: 3px solid var(--primary);
      padding: 2px 0 2px 14px;
      margin-bottom: 14px;
    }
    .example-item:last-child { margin-bottom: 0; }
    .example-sent {
      font-size: 13px;
      color: var(--text-primary);
      line-height: 1.7;
      font-weight: 500;
    }
    .example-note {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 3px;
    }

    /* Common mistakes */
    .mistake-block { margin-bottom: 14px; }
    .mistake-block:last-child { margin-bottom: 0; }
    .mistake-lbl {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .mistake-wrong {
      background: #FCEEEC;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 13px;
      color: #7A2E24;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .mistake-correct {
      background: #EAF7EA;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 13px;
      color: #1F5C2A;
      font-weight: 500;
    }
    .mistake-reason {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 7px;
      line-height: 1.55;
    }
    .divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0;
    }

    /* ── QUIZ SECTION ── */
    .quiz-dots {
      display: flex;
      gap: 7px;
      padding: 2px 20px 14px;
    }
    .q-dot {
      flex: 1; height: 7px;
      border-radius: 999px;
      background: var(--border);
      transition: background 0.3s ease;
    }
    .q-dot.done  { background: linear-gradient(90deg, var(--success), #7DC981); }
    .q-dot.wrong { background: linear-gradient(90deg, var(--error), #E8877E); }
    .q-dot.active{ background: linear-gradient(90deg, var(--primary), var(--primary-dark)); }

    .question-card {
      background: white;
      border-radius: 22px;
      padding: 22px 20px;
      box-shadow: var(--shadow-md);
    }
    .q-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--primary-dark);
      margin-bottom: 12px;
    }
    .q-text {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 17px;
      color: var(--text-primary);
      line-height: 1.5;
    }
    .q-blank {
      display: inline-block;
      min-width: 90px;
      border-bottom: 2.5px solid var(--primary);
      margin: 0 3px;
      text-align: center;
      color: var(--primary-dark);
      font-weight: 800;
      padding-bottom: 1px;
    }
    .q-blank.correct { border-color: var(--success); color: #1F5C2A; }
    .q-blank.wrong   { border-color: var(--error);   color: #7A2E24; }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .opt {
      background: white;
      border: 2px solid var(--border);
      border-radius: 18px;
      padding: 17px 18px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      text-align: left;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s ease;
    }
    .opt:active { transform: scale(0.98); }
    .opt.selected-correct {
      background: #EAF7EA;
      border-color: var(--success);
      color: #1F5C2A;
      font-weight: 700;
    }
    .opt.selected-wrong {
      background: #FCEEEC;
      border-color: var(--error);
      color: #7A2E24;
      font-weight: 700;
    }
    .opt.show-correct {
      background: #EAF7EA;
      border-color: var(--success);
      color: #1F5C2A;
      font-weight: 600;
    }
    .opt.dimmed { opacity: 0.42; pointer-events: none; }

    .feedback-panel {
      border-radius: 20px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .feedback-panel.correct {
      background: linear-gradient(135deg, #EAF7EA 0%, #D8F3DA 100%);
      border: 1.5px solid rgba(163,217,165,0.60);
    }
    .feedback-panel.wrong {
      background: linear-gradient(135deg, #FCEEEC 0%, #FAE2DF 100%);
      border: 1.5px solid rgba(244,168,160,0.60);
    }
    .feedback-title {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 15px;
    }
    .feedback-panel.correct .feedback-title { color: #1A6B2E; }
    .feedback-panel.wrong   .feedback-title { color: #7A2E24; }
    .feedback-text { font-size: 13px; line-height: 1.65; }
    .feedback-panel.correct .feedback-text { color: #2A6B38; }
    .feedback-panel.wrong   .feedback-text { color: #8A3A2E; }

    /* ── RESULT SECTION ── */
    .result-hero {
      background: radial-gradient(circle at 50% 0%, #F3EEFC 0%, #E8F6EF 70%);
      padding: 48px 28px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin: -4px -20px 0;
    }
    .result-emoji-box {
      width: 88px; height: 88px;
      background: white;
      border-radius: 28px;
      display: flex; align-items: center; justify-content: center;
      font-size: 42px;
      box-shadow: 0 14px 32px rgba(150,132,194,0.22);
    }
    .result-title {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 24px;
      color: var(--text-primary);
      text-align: center;
    }
    .result-sub {
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
    }
    .score-badge {
      background: white;
      border-radius: 22px;
      padding: 18px 40px;
      box-shadow: 0 10px 28px rgba(150,132,194,0.20);
      text-align: center;
    }
    .score-num {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 38px;
      color: var(--primary-dark);
      letter-spacing: -0.02em;
    }
    .score-lbl {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 600;
      margin-top: 2px;
    }
    .xp-card {
      background: linear-gradient(135deg, #FFF8E7 0%, #FFF0C2 100%);
      border-radius: 20px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 6px 16px rgba(255,201,107,0.25);
      border: 1.5px solid rgba(255,201,107,0.35);
    }
    .xp-icon-box {
      width: 52px; height: 52px;
      border-radius: 16px;
      background: linear-gradient(135deg, #FFD980, #FFC14D);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      box-shadow: 0 6px 14px rgba(255,193,77,0.45);
      flex-shrink: 0;
    }
    .xp-gained {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 19px;
      color: #8A6D1F;
    }
    .xp-total {
      font-size: 12px;
      color: #A68A38;
      margin-top: 3px;
      font-weight: 500;
    }
    .progress-card {
      background: white;
      border-radius: 20px;
      padding: 18px 20px;
      box-shadow: var(--shadow-md);
    }
    .progress-card-lbl {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 600;
      margin-bottom: 9px;
    }
    .progress-track {
      height: 10px;
      background: #EFEAF5;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--primary-dark));
      border-radius: 999px;
      transition: width 0.6s ease;
    }
    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 600;
    }
    .result-actions {
      display: flex;
      gap: 10px;
    }
    .btn-outline {
      flex: 1;
      padding: 16px;
      background: white;
      color: var(--primary-dark);
      border: 2px solid var(--primary);
      border-radius: 18px;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 14px;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .next-preview {
      font-size: 11px;
      color: var(--text-secondary);
      text-align: center;
      font-weight: 500;
    }

    /* ── BUTTONS ── */
    .btn-full {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      border: none;
      border-radius: 18px;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 14px;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(150,132,194,0.38);
      transition: transform 0.2s ease;
    }
    .btn-full:active { transform: scale(0.98); }
    .btn-full.dark {
      background: linear-gradient(135deg, #7C6BAA 0%, #6255A0 100%);
      box-shadow: 0 8px 20px rgba(100,85,160,0.40);
    }

    /* ── HIDDEN ── */
    .hidden { display: none !important; }

    @media (max-width: 480px) {
      body { padding: 0; }
      .page { max-width: 100%; }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- TOP BAR -->
  <div class="top-bar">
    <a class="back-btn" id="backBtn" href="lessons.html">←</a>
    <div class="top-bar-title" id="lessonTitle">Loading...</div>
    <div class="step-indicator" id="stepIndicator">Step 1 of 5</div>
  </div>

  <!-- STEP PROGRESS BAR -->
  <div class="step-bar" id="stepBar">
    <div class="step-seg active" id="seg0"></div>
    <div class="step-seg" id="seg1"></div>
    <div class="step-seg" id="seg2"></div>
    <div class="step-seg" id="seg3"></div>
    <div class="step-seg" id="seg4"></div>
  </div>

  <!-- DYNAMIC CONTENT -->
  <div class="body" id="mainBody"></div>

</div>

<script>
// ─────────────────────────────────────────
//  LESSON DATA
// ─────────────────────────────────────────
const LESSONS_DATA = {
  'morning-routine': {
    id: 'morning-routine',
    title: 'Morning Routine',
    icon: '☕',
    topic: 'Present Simple',
    situation: 'Every day, Sarah gets up early and follows the same routine before going to work.',
    story: {
      title: 'A Busy Morning',
      text: 'Every morning, Sarah <hl>wakes up</hl> at 6 AM. She <hl>brushes</hl> her teeth, <hl>takes</hl> a shower, and <hl>makes</hl> coffee. Sarah <hl>doesn\'t eat</hl> breakfast at home — she usually <hl>buys</hl> a sandwich on her way to work.'
    },
    grammar: {
      name: 'Present Simple',
      explanation: 'Kita pakai Present Simple untuk menjelaskan kebiasaan atau rutinitas yang dilakukan berulang-ulang. Sarah melakukan hal ini setiap hari — bukan hanya hari ini.',
      patterns: [
        { label: '✅ Positive', value: 'Subject + Verb (s/es)' },
        { label: '❌ Negative', value: 'Subject + don\'t / doesn\'t + Verb' },
        { label: '❓ Question', value: 'Do / Does + Subject + Verb?' }
      ],
      signalWords: ['every day', 'every morning', 'usually', 'always', 'often', 'never']
    },
    examples: [
      { sentence: 'She <hl>wakes up</hl> at 6 AM every day.', note: '→ Kebiasaan rutin harian' },
      { sentence: 'He <hl>doesn\'t drink</hl> coffee in the morning.', note: '→ Kebiasaan negatif' },
      { sentence: '<hl>Do</hl> you usually <hl>cook</hl> at home?', note: '→ Pertanyaan tentang kebiasaan' },
      { sentence: 'The shop <hl>opens</hl> at 8 AM every day.', note: '→ Fakta yang selalu benar' }
    ],
    mistakes: [
      {
        wrong: 'She wake up at 6 AM.',
        correct: 'She wakes up at 6 AM.',
        reason: 'Subject "she/he/it" selalu butuh tambahan -s atau -es pada verb di Present Simple.'
      },
      {
        wrong: 'She doesn\'t wakes up early.',
        correct: 'She doesn\'t wake up early.',
        reason: 'Setelah "doesn\'t", verb kembali ke bentuk dasar — tanpa -s/es.'
      }
    ],
    quiz: [
      {
        question: 'Sarah ___ breakfast at home.',
        blank: '___',
        options: ["don't eat", "doesn't eat", "not eat", "isn't eat"],
        correct: 1,
        explanation: 'Subject "Sarah" adalah orang ketiga tunggal (she), jadi pakai "doesn\'t" + verb dasar. Bukan "don\'t eat" (itu untuk I/you/we/they).'
      },
      {
        question: 'She ___ a shower every morning.',
        blank: '___',
        options: ['take', 'taking', 'takes', 'is take'],
        correct: 2,
        explanation: 'Subject "she" butuh verb + s/es → "takes". Present Simple untuk kebiasaan rutin.'
      },
      {
        question: '___ she usually buy coffee?',
        blank: '___',
        options: ['Do', 'Is', 'Does', 'Has'],
        correct: 2,
        explanation: 'Untuk pertanyaan Present Simple dengan subject she/he/it, kita pakai "Does" di awal kalimat.'
      },
      {
        question: 'They ___ to the office every day.',
        blank: '___',
        options: ['goes', 'go', 'is going', 'went'],
        correct: 1,
        explanation: 'Subject "they" pakai verb tanpa -s → "go". Tambahan -s hanya untuk he/she/it.'
      },
      {
        question: 'My brother ___ coffee in the morning.',
        blank: '___',
        options: ["don't drink", "not drink", "doesn't drinks", "doesn't drink"],
        correct: 3,
        explanation: '"My brother" = he (orang ketiga tunggal), jadi pakai "doesn\'t" + verb dasar "drink". Bukan "doesn\'t drinks".'
      }
    ],
    xpReward: 10,
    nextLesson: 'shopping'
  },

  'shopping': {
    id: 'shopping',
    title: 'Shopping',
    icon: '🛍️',
    topic: 'Present Simple',
    situation: 'Rina is at a supermarket. She needs to buy groceries for the week.',
    story: {
      title: 'A Busy Saturday',
      text: 'Every Saturday, Rina <hl>goes</hl> to the supermarket near her house. She <hl>usually buys</hl> vegetables, fruit, and snacks for the week. Today, she <hl>doesn\'t have</hl> much time, so she <hl>takes</hl> a basket instead of a trolley.'
    },
    grammar: {
      name: 'Present Simple',
      explanation: 'Digunakan untuk kebiasaan, rutinitas, dan fakta yang selalu benar. Perhatikan bagaimana Rina melakukan hal yang sama setiap Sabtu.',
      patterns: [
        { label: '✅ Positive', value: 'Subject + Verb (s/es)' },
        { label: '❌ Negative', value: 'Subject + don\'t / doesn\'t + Verb' },
        { label: '❓ Question', value: 'Do / Does + Subject + Verb?' }
      ],
      signalWords: ['every Saturday', 'usually', 'always', 'often', 'sometimes', 'never']
    },
    examples: [
      { sentence: 'She <hl>goes</hl> to the supermarket every Saturday.', note: '→ Kebiasaan rutin mingguan' },
      { sentence: 'He <hl>doesn\'t buy</hl> junk food anymore.', note: '→ Perubahan kebiasaan (negatif)' },
      { sentence: '<hl>Do</hl> you usually <hl>cook</hl> at home?', note: '→ Pertanyaan tentang kebiasaan' },
      { sentence: 'The shop <hl>opens</hl> at 8 AM every day.', note: '→ Fakta yang selalu benar' }
    ],
    mistakes: [
      {
        wrong: 'She go to the market every day.',
        correct: 'She goes to the market every day.',
        reason: 'Subject "she/he/it" selalu butuh tambahan -s atau -es pada verb.'
      },
      {
        wrong: 'She doesn\'t goes to the market.',
        correct: 'She doesn\'t go to the market.',
        reason: 'Setelah "doesn\'t", verb selalu kembali ke bentuk dasar tanpa -s.'
      }
    ],
    quiz: [
      {
        question: 'Rina ___ vegetables every week.',
        blank: '___',
        options: ['buy', 'buys', 'is buying', 'bought'],
        correct: 1,
        explanation: 'Subject "Rina" = she (orang ketiga tunggal) → verb + s = "buys". Signal word "every week" → Present Simple.'
      },
      {
        question: 'She ___ a basket instead of a trolley.',
        blank: '___',
        options: ['take', 'is take', 'takes', 'taking'],
        correct: 2,
        explanation: '"She" → verb + s = "takes". Ini kebiasaan yang dilakukan berulang.'
      },
      {
        question: '___ Rina usually shop on Saturdays?',
        blank: '___',
        options: ['Do', 'Is', 'Does', 'Has'],
        correct: 2,
        explanation: 'Untuk pertanyaan tentang she/he/it di Present Simple, gunakan "Does" di awal kalimat.'
      },
      {
        question: 'We ___ to the market on weekends.',
        blank: '___',
        options: ['goes', 'is going', 'go', 'went'],
        correct: 2,
        explanation: '"We" → verb tanpa -s = "go". Tambahan -s hanya untuk he/she/it.'
      },
      {
        question: 'My mom ___ fruits every week.',
        blank: '___',
        options: ["don't buy", "doesn't buy", "not buy", "doesn't buys"],
        correct: 1,
        explanation: '"My mom" = she → pakai "doesn\'t" + verb dasar "buy". Bukan "doesn\'t buys".'
      }
    ],
    xpReward: 10,
    nextLesson: 'at-school'
  },

  'at-school': {
    id: 'at-school',
    title: 'At School',
    icon: '📚',
    topic: 'Present Simple',
    situation: 'Dimas is a university student. Every day he has a different schedule at campus.',
    story: {
      title: 'A Day at Campus',
      text: 'Dimas <hl>wakes up</hl> at 7 AM every weekday. He <hl>takes</hl> the bus to campus because he <hl>doesn\'t have</hl> a motorcycle. His first class <hl>starts</hl> at 8 AM. He <hl>usually sits</hl> in the front row so he can focus.'
    },
    grammar: {
      name: 'Present Simple',
      explanation: 'Digunakan untuk rutinitas, kebiasaan, dan fakta umum. Dimas melakukan hal-hal ini setiap hari — bukan hanya hari ini.',
      patterns: [
        { label: '✅ Positive', value: 'Subject + Verb (s/es)' },
        { label: '❌ Negative', value: 'Subject + don\'t / doesn\'t + Verb' },
        { label: '❓ Question', value: 'Do / Does + Subject + Verb?' }
      ],
      signalWords: ['every day', 'every weekday', 'usually', 'always', 'often', 'sometimes']
    },
    examples: [
      { sentence: 'He <hl>takes</hl> the bus every morning.', note: '→ Kebiasaan transportasi sehari-hari' },
      { sentence: 'She <hl>doesn\'t bring</hl> lunch to school.', note: '→ Kebiasaan negatif' },
      { sentence: '<hl>Does</hl> he <hl>study</hl> at night?', note: '→ Pertanyaan tentang rutinitas' },
      { sentence: 'The class <hl>starts</hl> at 8 AM sharp.', note: '→ Fakta / jadwal tetap' }
    ],
    mistakes: [
      {
        wrong: 'He take the bus every day.',
        correct: 'He takes the bus every day.',
        reason: 'Subject "he/she/it" selalu butuh tambahan -s atau -es pada verb di Present Simple.'
      },
      {
        wrong: 'He doesn\'t takes the bus.',
        correct: 'He doesn\'t take the bus.',
        reason: 'Setelah "doesn\'t", verb kembali ke bentuk dasar — tanpa -s/es.'
      }
    ],
    quiz: [
      {
        question: 'Dimas ___ the bus every morning.',
        blank: '___',
        options: ['take', 'took', 'takes', 'is take'],
        correct: 2,
        explanation: '"Dimas" = he (orang ketiga tunggal) → verb + s = "takes". Signal word "every morning" → Present Simple.'
      },
      {
        question: 'His class ___ at 8 AM.',
        blank: '___',
        options: ['start', 'starting', 'started', 'starts'],
        correct: 3,
        explanation: '"His class" = it → verb + s = "starts". Ini adalah fakta / jadwal tetap.'
      },
      {
        question: '___ he usually sit in the front row?',
        blank: '___',
        options: ['Do', 'Is', 'Does', 'Did'],
        correct: 2,
        explanation: 'Untuk pertanyaan Present Simple dengan he/she/it, gunakan "Does" di depan kalimat.'
      },
      {
        question: 'Students ___ hard before exams.',
        blank: '___',
        options: ['studies', 'is studying', 'study', 'studied'],
        correct: 2,
        explanation: '"Students" = they → verb tanpa -s = "study". Tambahan -s hanya untuk he/she/it.'
      },
      {
        question: 'He ___ a motorcycle.',
        blank: '___',
        options: ["don't have", "doesn't has", "doesn't have", "not have"],
        correct: 2,
        explanation: '"He" → "doesn\'t" + verb dasar "have". Bukan "doesn\'t has" — setelah doesn\'t selalu verb dasar.'
      }
    ],
    xpReward: 10,
    nextLesson: 'at-work'
  }
};

// ─────────────────────────────────────────
//  APP STATE
// ─────────────────────────────────────────
const params   = new URLSearchParams(window.location.search);
const lessonId = params.get('id') || 'morning-routine';
const lesson   = LESSONS_DATA[lessonId];

// Steps: 0=story, 1=grammar, 2=examples, 3=mistakes, 4=quiz
let currentStep   = 0;
let currentQ      = 0;
let score         = 0;
let answered      = false;
const totalSteps  = 5;
const totalQ      = lesson ? lesson.quiz.length : 5;

// Redirect if no user
if (!localStorage.getItem('gs_user_name')) {
  window.location.href = 'onboarding.html';
}

// If lesson not found
if (!lesson) {
  document.getElementById('mainBody').innerHTML =
    '<p style="padding:40px;color:#8A8698;text-align:center;">Lesson not found.<br><a href="lessons.html" style="color:#9684C2;">Back to lessons</a></p>';
} else {
  document.getElementById('lessonTitle').textContent = lesson.title + ' ' + lesson.icon;
  updateStepBar();
  renderStep();
  markInProgress();
}

// ─────────────────────────────────────────
//  STEP BAR
// ─────────────────────────────────────────
function updateStepBar() {
  for (let i = 0; i < totalSteps; i++) {
    const seg = document.getElementById('seg' + i);
    seg.className = 'step-seg';
    if (i < currentStep)      seg.classList.add('done');
    else if (i === currentStep) seg.classList.add('active');
  }
  // Quiz dots vs step bar
  if (currentStep === 4) {
    document.getElementById('stepBar').classList.add('hidden');
    document.getElementById('stepIndicator').textContent = `Q ${currentQ + 1} of ${totalQ}`;
  } else {
    document.getElementById('stepBar').classList.remove('hidden');
    document.getElementById('stepIndicator').textContent = `Step ${currentStep + 1} of ${totalSteps}`;
  }
}

// ─────────────────────────────────────────
//  RENDER STEP
// ─────────────────────────────────────────
function renderStep() {
  const body = document.getElementById('mainBody');
  switch(currentStep) {
    case 0: renderStory(body);    break;
    case 1: renderGrammar(body);  break;
    case 2: renderExamples(body); break;
    case 3: renderMistakes(body); break;
    case 4: renderQuiz(body);     break;
  }
}

// ─────────────────────────────────────────
//  STEP 0 — STORY
// ─────────────────────────────────────────
function renderStory(body) {
  body.innerHTML = `
    <div class="card">
      <div class="card-label">📍 Situation</div>
      <p>${lesson.situation}</p>
    </div>
    <div class="card">
      <div class="card-label">📖 Story</div>
      <h3>${lesson.story.title}</h3>
      <p>${parseHL(lesson.story.text)}</p>
    </div>
    <button class="btn-full" onclick="nextStep()">Continue →</button>
  `;
}

// ─────────────────────────────────────────
//  STEP 1 — GRAMMAR
// ─────────────────────────────────────────
function renderGrammar(body) {
  const patterns = lesson.grammar.patterns.map(p => `
    <div class="pattern-row">
      <span class="pattern-lbl">${p.label}</span>
      <span class="pattern-val">${p.value}</span>
    </div>`).join('');

  const signals = lesson.grammar.signalWords.map(w =>
    `<span class="signal-tag">${w}</span>`).join('');

  body.innerHTML = `
    <div class="card">
      <div class="card-label">🎯 Grammar Focus</div>
      <h3>${lesson.grammar.name}</h3>
      <p>${lesson.grammar.explanation}</p>
    </div>
    <div class="card">
      <div class="card-label">📐 Pattern</div>
      <div class="pattern-box">${patterns}</div>
    </div>
    <div class="card">
      <div class="card-label">🔑 Signal Words</div>
      <div class="signal-row">${signals}</div>
    </div>
    <button class="btn-full" onclick="nextStep()">Continue →</button>
  `;
}
  // ─────────────────────────────────────────
//  STEP 2 — EXAMPLES
// ─────────────────────────────────────────
function renderExamples(body) {
  const examples = lesson.examples.map(e => `
    <div class="example-item">
      <div class="example-sent">${parseHL(e.sentence)}</div>
      <div class="example-note">${e.note}</div>
    </div>`).join('');

  body.innerHTML = `
    <div class="card">
      <div class="card-label">💬 Real-life Examples</div>
      ${examples}
    </div>
    <button class="btn-full" onclick="nextStep()">Continue →</button>
  `;
}

// ─────────────────────────────────────────
//  STEP 3 — COMMON MISTAKES
// ─────────────────────────────────────────
function renderMistakes(body) {
  const mistakes = lesson.mistakes.map((m, i) => `
    ${i > 0 ? '<div class="divider"></div>' : ''}
    <div class="mistake-block">
      <div class="mistake-lbl" style="color:#C0584C;">✗ Wrong</div>
      <div class="mistake-wrong">${m.wrong}</div>
      <div class="mistake-lbl" style="color:#2C7A39;margin-top:6px;">✓ Correct</div>
      <div class="mistake-correct"><strong>${m.correct}</strong></div>
      <div class="mistake-reason">${m.reason}</div>
    </div>`).join('');

  body.innerHTML = `
    <div class="card">
      <div class="card-label">⚠️ Common Mistakes</div>
      ${mistakes}
    </div>
    <button class="btn-full dark" onclick="nextStep()">Start Quiz →</button>
  `;
}

// ─────────────────────────────────────────
//  STEP 4 — QUIZ
// ─────────────────────────────────────────
function renderQuiz(body) {
  answered = false;
  const q = lesson.quiz[currentQ];

  // Build dots
  const dots = lesson.quiz.map((_, i) => {
    let cls = 'q-dot';
    if (i < currentQ) cls += ' done';
    else if (i === currentQ) cls += ' active';
    return `<div class="${cls}" id="qdot${i}"></div>`;
  }).join('');

  // Build options
  const opts = q.options.map((opt, i) =>
    `<button class="opt" id="opt${i}" onclick="selectAnswer(${i})">${opt}</button>`
  ).join('');

  // Replace blank in question
  const qText = q.question.replace('___',
    `<span class="q-blank" id="qBlank">______</span>`);

  body.innerHTML = `
    <div class="quiz-dots">${dots}</div>
    <div class="question-card">
      <div class="q-label">Question ${currentQ + 1}</div>
      <div class="q-text">${qText}</div>
    </div>
    <div class="options">${opts}</div>
    <div id="feedbackArea"></div>
    <div id="nextBtnArea"></div>
  `;

  // Change back button to ✕ during quiz
  document.getElementById('backBtn').textContent = '✕';
  document.getElementById('backBtn').href = '#';
  document.getElementById('backBtn').onclick = () => {
    if (confirm('Exit quiz? Your progress in this quiz will be lost.')) {
      window.location.href = 'lessons.html';
    }
  };
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;

  const q = lesson.quiz[currentQ];
  const isCorrect = idx === q.correct;
  if (isCorrect) score++;

  // Style options
  document.querySelectorAll('.opt').forEach((btn, i) => {
    if (i === idx && isCorrect)      btn.classList.add('selected-correct');
    else if (i === idx && !isCorrect) btn.classList.add('selected-wrong');
    else if (i === q.correct && !isCorrect) btn.classList.add('show-correct');
    else btn.classList.add('dimmed');
  });

  // Fill blank
  const blank = document.getElementById('qBlank');
  if (blank) {
    blank.textContent = q.options[q.correct];
    blank.className = 'q-blank ' + (isCorrect ? 'correct' : 'wrong');
  }

  // Update dot
  const dot = document.getElementById('qdot' + currentQ);
  if (dot) {
    dot.classList.remove('active');
    dot.classList.add(isCorrect ? 'done' : 'wrong');
  }

  // Feedback
  const fb = document.getElementById('feedbackArea');
  fb.innerHTML = `
    <div class="feedback-panel ${isCorrect ? 'correct' : 'wrong'}">
      <div class="feedback-title">${isCorrect ? '✓ That\'s correct!' : 'Not quite — here\'s why'}</div>
      <div class="feedback-text">${q.explanation}</div>
    </div>`;

  // Next button
  const nb = document.getElementById('nextBtnArea');
  const isLast = currentQ === totalQ - 1;
  nb.innerHTML = `
    <button class="btn-full dark" onclick="${isLast ? 'showResult()' : 'nextQuestion()'}">
      ${isLast ? 'See Result →' : 'Next Question →'}
    </button>`;
}

function nextQuestion() {
  currentQ++;
  updateStepBar();
  renderQuiz(document.getElementById('mainBody'));
}

// ─────────────────────────────────────────
//  RESULT
// ─────────────────────────────────────────
function showResult() {
  const body = document.getElementById('mainBody');
  document.getElementById('stepBar').classList.add('hidden');
  document.getElementById('stepIndicator').textContent = 'Complete! 🎉';
  document.getElementById('backBtn').textContent = '←';
  document.getElementById('backBtn').href = 'lessons.html';
  document.getElementById('backBtn').onclick = null;

  // Save progress
  saveProgress();

  const totalXP   = parseInt(localStorage.getItem('gs_xp') || '0');
  const progress  = JSON.parse(localStorage.getItem('gs_progress') || '{}');
  const completed = Object.values(progress).filter(p => p.status === 'completed').length;
  const pct       = Math.round((completed / 9) * 100);

  const emoji = score >= 4 ? '🎉' : score >= 2 ? '👍' : '💪';
  const nextLessonId = lesson.nextLesson;

  body.innerHTML = `
    <div class="result-hero">
      <div class="result-emoji-box">${emoji}</div>
      <div class="result-title">Story Complete!</div>
      <div class="result-sub">You finished the ${lesson.title} story</div>
      <div class="score-badge">
        <div class="score-num">${score} / ${totalQ}</div>
        <div class="score-lbl">Quiz Score</div>
      </div>
    </div>
    <div class="xp-card">
      <div class="xp-icon-box">⭐</div>
      <div>
        <div class="xp-gained">+${lesson.xpReward} XP earned!</div>
        <div class="xp-total">Total XP: ${totalXP} XP</div>
      </div>
    </div>
    <div class="progress-card">
      <div class="progress-card-lbl">Overall Progress</div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
      <div class="progress-info">
        <span>${completed} of 9 lessons done</span>
        <span>${pct}%</span>
      </div>
    </div>
    <div class="result-actions">
      <a href="dashboard.html" class="btn-outline">← Dashboard</a>
      ${nextLessonId
        ? `<button class="btn-full dark" onclick="window.location.href='lesson-detail.html?id=${nextLessonId}'">Next Story →</button>`
        : `<button class="btn-full dark" onclick="window.location.href='lessons.html'">All Lessons</button>`}
    </div>
    ${nextLessonId ? `<div class="next-preview">Next: ${LESSONS_DATA[nextLessonId]?.title || ''}</div>` : ''}
  `;
}
  // ─────────────────────────────────────────
//  SAVE PROGRESS
// ─────────────────────────────────────────
function saveProgress() {
  const progress = JSON.parse(localStorage.getItem('gs_progress') || '{}');
  progress[lessonId] = {
    status: 'completed',
    score: score,
    totalQuestions: totalQ,
    lastAttemptDate: new Date().toISOString().split('T')[0]
  };
  localStorage.setItem('gs_progress', JSON.stringify(progress));

  // Update XP
  const oldXP = parseInt(localStorage.getItem('gs_xp') || '0');
  localStorage.setItem('gs_xp', oldXP + lesson.xpReward);

  // Update recent lessons
  let recent = JSON.parse(localStorage.getItem('gs_recent') || '[]');
  recent = [lessonId, ...recent.filter(id => id !== lessonId)].slice(0, 5);
  localStorage.setItem('gs_recent', JSON.stringify(recent));

  localStorage.removeItem('gs_last_lesson');
}

function markInProgress() {
  const progress = JSON.parse(localStorage.getItem('gs_progress') || '{}');
  if (!progress[lessonId] || progress[lessonId].status === 'new') {
    progress[lessonId] = { status: 'in-progress', score: null, totalQuestions: totalQ };
    localStorage.setItem('gs_progress', JSON.stringify(progress));
  }
  localStorage.setItem('gs_last_lesson', lessonId);

  // Track recent
  let recent = JSON.parse(localStorage.getItem('gs_recent') || '[]');
  recent = [lessonId, ...recent.filter(id => id !== lessonId)].slice(0, 5);
  localStorage.setItem('gs_recent', JSON.stringify(recent));
}

// ─────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────
function nextStep() {
  currentStep++;
  updateStepBar();
  renderStep();
  window.scrollTo(0, 0);
}

function parseHL(text) {
  return text.replace(/<hl>(.*?)<\/hl>/g, '<span class="hl">$1</span>');
}
</script>
