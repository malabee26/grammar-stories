<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome — Grammar Stories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #B8A9D9;
      --primary-dark: #9684C2;
      --accent: #A8E6CF;
      --bg: #FAF7F2;
      --surface: #FFFFFF;
      --text-primary: #3D3A4E;
      --text-secondary: #8A8698;
      --border: #EAE5DD;
      --error: #F4A8A0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page {
      width: 100%;
      max-width: 400px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      border-radius: 40px;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: radial-gradient(circle at 70% 0%, #F3EEFC 0%, #E8F6EF 70%);
      padding: 64px 32px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border-radius: 0 0 48px 48px;
      position: relative;
      overflow: hidden;
    }
    .header-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      pointer-events: none;
    }
    .header-blob-1 {
      width: 180px; height: 180px;
      background: var(--accent);
      opacity: 0.35;
      top: -60px; right: -40px;
    }
    .header-blob-2 {
      width: 120px; height: 120px;
      background: var(--primary);
      opacity: 0.25;
      bottom: -30px; left: -20px;
    }

    .emoji-box {
      width: 80px; height: 80px;
      background: white;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      box-shadow: 0 12px 28px rgba(150, 132, 194, 0.20);
      margin-bottom: 20px;
      position: relative;
      z-index: 2;
    }

    .header h1 {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 24px;
      color: var(--text-primary);
      text-align: center;
      margin-bottom: 8px;
      line-height: 1.3;
      position: relative;
      z-index: 2;
    }

    .header p {
      font-size: 14px;
      color: var(--text-secondary);
      text-align: center;
      line-height: 1.6;
      position: relative;
      z-index: 2;
    }

    /* Body */
    .body {
      flex: 1;
      padding: 36px 28px 40px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .field-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--primary-dark);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .input-wrap { position: relative; }

    input[type="text"] {
      width: 100%;
      padding: 17px 18px;
      background: white;
      border: 2px solid var(--border);
      border-radius: 16px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: 0 4px 16px rgba(184, 169, 217, 0.20);
    }
    input[type="text"].error {
      border-color: var(--error);
    }
    input[type="text"]::placeholder {
      color: var(--text-secondary);
      font-weight: 400;
    }

    .error-msg {
      font-size: 12px;
      color: #C0584C;
      margin-top: 6px;
      display: none;
    }
    .error-msg.show { display: block; }

    .input-hint {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-top: 2px;
    }

    .spacer { flex: 1; min-height: 24px; }

    .btn-start {
      width: 100%;
      padding: 17px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      border: none;
      border-radius: 18px;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(150, 132, 194, 0.40);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }
    .btn-start:active {
      transform: scale(0.98);
      box-shadow: 0 5px 14px rgba(150, 132, 194, 0.30);
    }

    .footer-note {
      font-size: 11px;
      color: var(--text-secondary);
      text-align: center;
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    /* Responsive */
    @media (max-width: 480px) {
      body { padding: 0; background: var(--bg); }
      .page { border-radius: 0; max-width: 100%; }
    }
  </style>
</head>
<body>

  <div class="page">
    <!-- Header -->
    <div class="header">
      <div class="header-blob header-blob-1"></div>
      <div class="header-blob header-blob-2"></div>
      <div class="emoji-box">👋</div>
      <h1>Welcome to<br>Grammar Stories</h1>
      <p>Before we begin, what<br>should we call you?</p>
    </div>

    <!-- Body -->
    <div class="body">
      <div class="field-label">Your Name</div>

      <div class="input-wrap">
        <input
          type="text"
          id="nameInput"
          placeholder="e.g. Mala"
          maxlength="30"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        >
      </div>

      <div class="error-msg" id="errorMsg">
        Please enter your name to continue.
      </div>

      <div class="input-hint">
        We'll use this to greet you personally. No email, no password — just your name.
      </div>

      <div class="spacer"></div>

      <button class="btn-start" onclick="handleSave()">
        Let's Start Learning →
      </button>

      <div class="footer-note">
        🔒 Saved only on this device
      </div>
    </div>
  </div>

  <script>
    // Focus input on load
    window.addEventListener('load', () => {
      document.getElementById('nameInput').focus();
    });

    // Allow pressing Enter to submit
    document.getElementById('nameInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleSave();
    });

    // Clear error when user starts typing
    document.getElementById('nameInput').addEventListener('input', () => {
      const input = document.getElementById('nameInput');
      const errorMsg = document.getElementById('errorMsg');
      input.classList.remove('error');
      errorMsg.classList.remove('show');
    });

    function handleSave() {
      const input = document.getElementById('nameInput');
      const errorMsg = document.getElementById('errorMsg');
      const name = input.value.trim();

      // Validation
      if (!name || name.length < 2) {
        input.classList.add('error');
        errorMsg.classList.add('show');
        input.focus();
        return;
      }

      // Save to Local Storage
      localStorage.setItem('gs_user_name', name);

      // Go to Dashboard
      window.location.href = 'dashboard.html';
    }
  </script>

</body>
</html>
